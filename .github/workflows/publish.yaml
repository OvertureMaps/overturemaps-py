---
# Reusable workflow — call from a parent workflow to build and publish a Python package to PyPI.
# Uses OIDC trusted publishing — no API token required.
# Set environment to 'test-pypi' to publish to Test PyPI instead.
name: Publish Package

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment name: 'pypi' or 'test-pypi'"
        required: false
        default: pypi
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write # OIDC — required for PyPI trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: ${{ inputs.environment == 'test-pypi' && 'https://test.pypi.org/legacy/' || '' }}
