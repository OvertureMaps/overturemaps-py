---
# Publishes the overturemaps package in two scenarios:
#   1. Release (production): triggered when a GitHub Release is published → publishes to PyPI.
#   2. PR validation (dry-run): triggered on PRs that touch pyproject.toml or either publish
#      workflow → publishes to Test PyPI to verify the build and publish pipeline end-to-end
#      without affecting the production package index.
name: Publish overturemaps-py to PyPI

on:
  release:
    types: [published]
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/publish.yaml
      - .github/workflows/publish-overturemaps-py.yaml

jobs:
  publish:
    uses: ./.github/workflows/publish.yaml
    with:
      environment: ${{ github.event_name == 'pull_request' && 'test-pypi' || 'pypi' }}
